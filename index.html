<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Descuentos Gratis | ConfiguroWeb</title>
    <meta name="description" content="Calcula descuentos y porcentajes gratis. Descubre cuanto ahorraras y el precio final de tus compras con rebajas.">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col justify-between">
    <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
            <span class="text-xl font-bold text-rose-600">Configuro<span class="text-slate-900">Web</span></span>
            <a href="https://configuroweb.com/tag/gratis" class="text-sm font-medium text-slate-600 hover:text-rose-600">← Volver a Apps Gratuitas</a>
        </div>
    </header>
    <main class="max-w-3xl mx-auto px-4 py-8 flex-grow w-full">
        <div class="text-center mb-8">
            <h1 class="text-2xl md:text-3xl font-bold text-slate-900 mb-2">Calculadora de Descuentos</h1>
            <p class="text-slate-500 text-sm">Calcula el precio final de tus compras con descuentos.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-xs">
                <form class="space-y-4" onsubmit="event.preventDefault(); calc();">
                    <div>
                        <label class="block text-xs font-medium text-slate-700 mb-1">Precio original ($)</label>
                        <input type="number" id="price" step="0.01" min="0" required placeholder="Ej. 150000" oninput="calc()" class="w-full px-3 py-2 border border-slate-300 rounded-xl text-sm focus:outline-none focus:border-rose-500">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-700 mb-2">Descuento</label>
                        <div class="grid grid-cols-4 gap-2 mb-3">
                            <button type="button" data-disc="10" onclick="setDisc(10)" class="disc-btn py-2 rounded-xl text-sm font-semibold border border-slate-300 hover:border-rose-500 cursor-pointer">10%</button>
                            <button type="button" data-disc="25" onclick="setDisc(25)" class="disc-btn py-2 rounded-xl text-sm font-semibold border border-slate-300 hover:border-rose-500 cursor-pointer">25%</button>
                            <button type="button" data-disc="50" onclick="setDisc(50)" class="disc-btn py-2 rounded-xl text-sm font-semibold border border-slate-300 hover:border-rose-500 cursor-pointer">50%</button>
                            <button type="button" data-disc="70" onclick="setDisc(70)" class="disc-btn py-2 rounded-xl text-sm font-semibold border border-slate-300 hover:border-rose-500 cursor-pointer">70%</button>
                        </div>
                        <input type="number" id="customDisc" step="1" min="0" max="100" placeholder="Otro %" oninput="calc()" class="w-full px-3 py-2 border border-slate-300 rounded-xl text-sm focus:outline-none focus:border-rose-500">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-700 mb-1">Descuentos adicionales (opcional)</label>
                        <input type="number" id="secondDisc" step="1" min="0" max="100" placeholder="Ej. 20 (cupon extra)" oninput="calc()" class="w-full px-3 py-2 border border-slate-300 rounded-xl text-sm focus:outline-none focus:border-rose-500">
                    </div>
                </form>
            </div>
            <div class="space-y-4">
                <div class="bg-slate-900 text-white p-6 rounded-2xl shadow-xs">
                    <h2 class="text-sm font-semibold uppercase tracking-wider text-slate-400 mb-4">Resultado</h2>
                    <div class="space-y-4">
                        <div class="flex justify-between items-center">
                            <span class="text-slate-400 text-sm">Precio original</span>
                            <span id="originalPrice" class="text-lg font-semibold text-slate-300 line-through">$0</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-slate-400 text-sm">Ahorro total</span>
                            <span id="savings" class="text-lg font-semibold text-rose-400">$0</span>
                        </div>
                        <hr class="border-slate-800">
                        <div class="text-center pt-2">
                            <p class="text-slate-400 text-xs uppercase mb-1">Precio final</p>
                            <p id="finalPrice" class="text-4xl font-extrabold text-emerald-400">$0</p>
                            <p id="totalDisc" class="text-xs text-slate-500 mt-2">0% de descuento</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <footer class="bg-white border-t border-slate-200 mt-12">
        <div class="max-w-5xl mx-auto px-4 py-6 text-center text-xs text-slate-400">&copy; 2026 ConfiguroWeb.</div>
    </footer>
    <script>
        const fmt = new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', minimumFractionDigits: 0 });
        let selectedDisc = 0;

        function setDisc(pct) {
            selectedDisc = pct;
            document.getElementById('customDisc').value = '';
            document.querySelectorAll('.disc-btn').forEach(btn => {
                if (parseInt(btn.dataset.disc) === pct) btn.className = 'disc-btn py-2 rounded-xl text-sm font-semibold bg-rose-600 text-white border border-rose-600 cursor-pointer';
                else btn.className = 'disc-btn py-2 rounded-xl text-sm font-semibold border border-slate-300 hover:border-rose-500 cursor-pointer';
            });
            calc();
        }

        function calc() {
            const price = parseFloat(document.getElementById('price').value) || 0;
            const customDisc = parseFloat(document.getElementById('customDisc').value);
            const disc1 = isNaN(customDisc) ? selectedDisc : customDisc;
            const disc2 = parseFloat(document.getElementById('secondDisc').value) || 0;

            const afterDisc1 = price * (1 - disc1 / 100);
            const finalPrice = afterDisc1 * (1 - disc2 / 100);
            const savings = price - finalPrice;
            const totalPct = price > 0 ? Math.round((savings / price) * 100) : 0;

            document.getElementById('originalPrice').innerText = fmt.format(price);
            document.getElementById('savings').innerText = fmt.format(savings);
            document.getElementById('finalPrice').innerText = fmt.format(finalPrice);
            document.getElementById('totalDisc').innerText = totalPct + '% de descuento total';
        }
    </script>
</body>
</html>
